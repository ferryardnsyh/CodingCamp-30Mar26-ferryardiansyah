<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Expense & Budget Visualizer</h1>
        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Toggle dark mode"
        >
          <span class="theme-icon">🌙</span>
        </button>
      </header>

      <main>
        <!-- Balance Display Section -->
        <section class="balance-section">
          <h2>Total Balance</h2>
          <div id="balance-display" class="balance-amount">Rp 0</div>
        </section>

        <!-- Monthly Summary Section -->
        <section class="summary-section">
          <h2>Monthly Summary</h2>
          <div class="summary-controls">
            <button id="prev-month" class="btn-month">◀ Previous</button>
            <span id="current-month" class="current-month">January 2024</span>
            <button id="next-month" class="btn-month">Next ▶</button>
          </div>
          <div class="summary-stats">
            <div class="stat-item">
              <span class="stat-label">Total Expenses</span>
              <span id="month-total" class="stat-value">Rp 0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Transactions</span>
              <span id="month-count" class="stat-value">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Average</span>
              <span id="month-average" class="stat-value">Rp 0</span>
            </div>
          </div>
        </section>

        <!-- Input Form Section -->
        <section class="form-section">
          <h2>Add Transaction</h2>
          <form id="transaction-form">
            <div class="form-group">
              <label for="item-name">Item Name</label>
              <input
                type="text"
                id="item-name"
                name="itemName"
                placeholder="Enter item name"
                required
              />
            </div>

            <div class="form-group">
              <label for="amount">Amount</label>
              <input
                type="number"
                id="amount"
                name="amount"
                placeholder="0.00"
                step="0.01"
                min="0.01"
                required
              />
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" name="category" required>
                <option value="">Select a category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Fun">Fun</option>
              </select>
              <button
                type="button"
                id="add-category-btn"
                class="btn-add-category"
              >
                + Add Custom Category
              </button>
            </div>

            <div
              id="custom-category-form"
              class="custom-category-form"
              style="display: none"
            >
              <div class="form-group">
                <label for="new-category-name">New Category Name</label>
                <input
                  type="text"
                  id="new-category-name"
                  placeholder="Enter category name"
                />
              </div>
              <div class="form-group">
                <label for="new-category-color">Category Color</label>
                <input type="color" id="new-category-color" value="#9B59B6" />
              </div>
              <div class="custom-category-actions">
                <button
                  type="button"
                  id="save-category-btn"
                  class="btn-save-category"
                >
                  Save
                </button>
                <button
                  type="button"
                  id="cancel-category-btn"
                  class="btn-cancel-category"
                >
                  Cancel
                </button>
              </div>
            </div>

            <div
              id="validation-error"
              class="error-message"
              style="display: none"
            ></div>

            <button type="submit" class="btn-submit">Add Transaction</button>
          </form>
        </section>

        <!-- Transaction List Section -->
        <section class="transaction-section">
          <h2>Transaction History</h2>
          <div id="transaction-list" class="transaction-list-container">
            <!-- Transactions will be dynamically added here -->
          </div>
        </section>

        <!-- Chart Section -->
        <section class="chart-section">
          <h2>Spending Distribution</h2>
          <canvas id="pie-chart" width="400" height="400"></canvas>
        </section>
      </main>
    </div>

    <script src="js/chart.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
